<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>豆瓣电影 Top250 数据查询系统</title>
<style>
  :root {
    --bg: #f5f5f5;
    --card: #fff;
    --text: #333;
    --muted: #999;
    --accent: #07c160;
    --danger: #e74c3c;
    --border: #e8e8e8;
    --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .btn-group { display: flex; gap: 8px; }

  /* Buttons */
  .btn { padding: 8px 20px; border: none; border-radius: var(--radius); font-size: 14px; cursor: pointer; font-weight: 500; transition: opacity .2s; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-outline { background: var(--card); color: var(--accent); border: 1px solid var(--accent); }
  .btn-outline:hover { background: #f0fdf4; }

  /* Stats bar */
  .stats-bar { display: flex; gap: 24px; padding: 12px 18px; background: var(--card); border-radius: var(--radius); margin-bottom: 16px; font-size: 14px; border: 1px solid var(--border); flex-wrap: wrap; }
  .stats-bar span { color: var(--muted); }
  .stats-bar strong { color: var(--text); margin-left: 4px; }

  /* Filter */
  .filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-row label { font-size: 14px; color: var(--muted); white-space: nowrap; }
  .filter-row input[type=range] { width: 160px; accent-color: var(--accent); }
  .filter-row .rating-val { font-weight: 600; min-width: 32px; }

  /* Table */
  .table-wrap { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 10px 14px; text-align: left; white-space: nowrap; }
  th { background: #fafafa; font-weight: 600; border-bottom: 2px solid var(--border); position: sticky; top: 0; }
  td { border-bottom: 1px solid var(--border); }
  tr:hover td { background: #f9fdf9; }
  .rank-col { width: 50px; text-align: center; color: var(--muted); }
  .rating-col { font-weight: 600; color: #e09a24; }
  .votes-col { color: var(--muted); font-size: 13px; }
  .link-col a { color: var(--accent); text-decoration: none; }
  .link-col a:hover { text-decoration: underline; }

  /* States */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty p { margin-bottom: 12px; font-size: 15px; }
  .status { font-size: 13px; color: var(--muted); margin-left: 8px; }
  .status.error { color: var(--danger); }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>豆瓣电影 Top250 数据查询系统</h1>
    <div class="btn-group">
      <button class="btn btn-primary" id="scrapeBtn" onclick="doScrape()">开始采集</button>
      <button class="btn btn-outline" id="exportBtn" onclick="doExport()">导出 Excel</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <span>总计<strong id="statTotal">-</strong>条</span>
    <span>平均评分<strong id="statAvg">-</strong></span>
    <span>最高<strong id="statMax">-</strong></span>
  </div>

  <!-- Filter -->
  <div class="filter-row">
    <label>最低评分：</label>
    <input type="range" id="ratingSlider" min="0" max="10" step="0.1" value="0" oninput="onFilterChange()">
    <span class="rating-val" id="ratingLabel">全部</span>
    <span class="status" id="statusMsg"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="rank-col">排名</th>
          <th>电影名称</th>
          <th>评分</th>
          <th>评价人数</th>
          <th>导演</th>
          <th>年份</th>
          <th>类型</th>
          <th>链接</th>
        </tr>
      </thead>
      <tbody id="movieBody">
        <tr><td colspan="8" class="empty"><p>暂无数据</p><p style="font-size:13px">点击"开始采集"获取豆瓣电影 Top250</p></td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
// ============================================================
// 页面加载时获取数据
// ============================================================
async function loadMovies(minRating) {
  let url = '/api/movies';
  if (minRating && minRating > 0) {
    url += '?min_rating=' + minRating;
  }
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  return resp.json();
}

async function loadStats() {
  const resp = await fetch('/api/movies/stats');
  return resp.json();
}

// ============================================================
// 渲染
// ============================================================
function renderTable(movies) {
  const tbody = document.getElementById('movieBody');
  if (!movies || movies.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty"><p>暂无数据</p><p style="font-size:13px">点击"开始采集"获取豆瓣电影 Top250</p></td></tr>';
    return;
  }
  tbody.innerHTML = movies.map(m => `
    <tr>
      <td class="rank-col">${m.rank ?? '-'}</td>
      <td>${esc(m.title) || '-'}</td>
      <td class="rating-col">${m.rating ?? '-'}</td>
      <td class="votes-col">${m.votes ? (m.votes/10000).toFixed(0) + '万' : '-'}</td>
      <td>${esc(m.director) || '-'}</td>
      <td>${m.year ?? '-'}</td>
      <td>${esc(m.genre) || '-'}</td>
      <td class="link-col">${m.link ? '<a href="'+ esc(m.link) +'" target="_blank">详情</a>' : '-'}</td>
    </tr>
  `).join('');
}

function renderStats(stats) {
  document.getElementById('statTotal').textContent = stats.total || 0;
  document.getElementById('statAvg').textContent = stats.avg_rating || '-';
  document.getElementById('statMax').textContent = stats.max_rating ? stats.max_rating + ' (' + stats.max_title + ')' : '-';
}

function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================================
// 刷新全部
// ============================================================
async function refreshAll() {
  const slider = document.getElementById('ratingSlider');
  const minRating = parseFloat(slider.value) || 0;
  try {
    const [movies, stats] = await Promise.all([loadMovies(minRating), loadStats()]);
    renderTable(movies);
    renderStats(stats);
    document.getElementById('statusMsg').textContent = '';
    document.getElementById('statusMsg').className = 'status';
  } catch (e) {
    document.getElementById('statusMsg').textContent = '加载失败: ' + e.message;
    document.getElementById('statusMsg').className = 'status error';
  }
}

// ============================================================
// 筛选
// ============================================================
function onFilterChange() {
  const slider = document.getElementById('ratingSlider');
  const val = parseFloat(slider.value);
  document.getElementById('ratingLabel').textContent = val > 0 ? '≥ ' + val.toFixed(1) : '全部';
  refreshAll();
}

// ============================================================
// 采集
// ============================================================
async function doScrape() {
  const btn = document.getElementById('scrapeBtn');
  btn.disabled = true;
  btn.textContent = '采集中...';
  document.getElementById('statusMsg').textContent = '正在采集，预计15秒...';
  document.getElementById('statusMsg').className = 'status';

  try {
    const resp = await fetch('/api/movies/scrape', { method: 'POST' });
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.detail || '未知错误');
    }
    const data = await resp.json();
    document.getElementById('statusMsg').textContent = '采集完成：' + data.count + ' 条';
    document.getElementById('statusMsg').className = 'status';
    document.getElementById('ratingSlider').value = 0;
    document.getElementById('ratingLabel').textContent = '全部';
    await refreshAll();
  } catch (e) {
    document.getElementById('statusMsg').textContent = '采集失败: ' + e.message;
    document.getElementById('statusMsg').className = 'status error';
  } finally {
    btn.disabled = false;
    btn.textContent = '开始采集';
  }
}

// ============================================================
// 导出
// ============================================================
function doExport() {
  window.open('/api/movies/export', '_blank');
}

// ============================================================
// 初始化
// ============================================================
refreshAll();
</script>
</body>
</html>
