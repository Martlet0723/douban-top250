<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>豆瓣电影 Top250 数据查询系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #fff;
    --text: #1a1a2e;
    --muted: #888;
    --accent: #07c160;
    --accent2: #2080f0;
    --danger: #e74c3c;
    --border: #e8e8e8;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
  .container { max-width: 1260px; margin: 0 auto; padding: 20px 16px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
  .header h1 { font-size: 20px; font-weight: 650; letter-spacing: .3px; }
  .btn-group { display: flex; gap: 8px; }

  /* Buttons */
  .btn { padding: 8px 20px; border: none; border-radius: var(--radius); font-size: 13px; cursor: pointer; font-weight: 550; transition: all .2s; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #06b053; }
  .btn-outline { background: var(--card); color: var(--accent2); border: 1.5px solid var(--accent2); }
  .btn-outline:hover { background: #f0f6ff; }

  /* Stats grid — card layout */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat-card { background: var(--card); border-radius: var(--radius); padding: 14px 18px; box-shadow: var(--shadow); border: 1px solid var(--border); }
  .stat-card .label { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .stat-card .value { font-size: 22px; font-weight: 700; }
  .stat-card .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Chart + stats row */
  .dashboard { display: grid; grid-template-columns: 1fr 320px; gap: 12px; margin-bottom: 16px; }
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); padding: 12px 16px; }
  .card h3 { font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  .chart-wrap { height: 160px; }

  /* Filter row */
  .filter-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-row label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .filter-row input[type=range] { width: 140px; accent-color: var(--accent); }
  .filter-row .rating-val { font-weight: 650; min-width: 55px; font-size: 14px; }
  .search-box { padding: 6px 12px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 13px; width: 180px; outline: none; }
  .search-box:focus { border-color: var(--accent2); }
  .result-hint { font-size: 12px; color: var(--muted); margin-left: 4px; }

  /* Progress bar — inline in filter row */
  .progress-wrap { display: none; align-items: center; gap: 8px; margin-left: 4px; }
  .progress-wrap.active { display: inline-flex; }
  .progress-bar { width: 180px; height: 8px; background: #e8e8e8; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
  .progress-bar .fill { height: 100%; background: linear-gradient(90deg, var(--accent), #05a84d); border-radius: 4px; transition: width .8s ease; width: 0%; }
  .progress-text { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* Table — fixed height + scroll, 250 rows confined */
  .table-wrap { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
  .table-scroll { max-height: 520px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 9px 12px; text-align: left; white-space: nowrap; }
  th { background: #fafbfc; font-weight: 600; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 1; font-size: 12px; text-transform: uppercase; letter-spacing: .3px; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--accent2); }
  .sort-arrow { font-size: 10px; margin-left: 2px; }
  td { border-bottom: 1px solid var(--border); }
  tr:hover td { background: #f7f9fb; }
  .rank-col { width: 40px; text-align: center; color: var(--muted); }
  .rating-col { font-weight: 650; color: #e0901e; }
  .votes-col { color: var(--muted); font-size: 12px; }
  .link-col a { color: var(--accent2); text-decoration: none; font-size: 12px; }
  .link-col a:hover { text-decoration: underline; }

  /* Pagination */
  .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 0; font-size: 12px; }
  .pagination button { padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); cursor: pointer; font-size: 12px; color: var(--text); }
  .pagination button:hover:not(:disabled) { border-color: var(--accent2); color: var(--accent2); }
  .pagination button:disabled { opacity: .3; cursor: default; }
  .pagination span { color: var(--muted); }

  /* States */
  .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty p { margin-bottom: 8px; font-size: 14px; }
  .status { font-size: 12px; color: var(--muted); }
  .status.error { color: var(--danger); }

  /* Responsive */
  @media (max-width: 900px) {
    .dashboard { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>豆瓣电影 Top250 · 数据查询系统</h1>
    <div class="btn-group">
      <button class="btn btn-primary" id="scrapeBtn" onclick="doScrape()">开始采集</button>
      <button class="btn btn-outline" id="exportBtn" onclick="doExport()">导出 Excel</button>
    </div>
  </div>

  <!-- Stats grid -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">电影总数</div>
      <div class="value" id="statTotal">-</div>
      <div class="sub">豆瓣 Top250</div>
    </div>
    <div class="stat-card">
      <div class="label">平均评分</div>
      <div class="value" id="statAvg">-</div>
      <div class="sub" id="statMinMax">-</div>
    </div>
    <div class="stat-card">
      <div class="label">总评价人数</div>
      <div class="value" id="statVotes">-</div>
      <div class="sub">条评论</div>
    </div>
  </div>

  <!-- Dashboard: chart + top movies -->
  <div class="dashboard">
    <div class="card">
      <h3>评分分布</h3>
      <div class="chart-wrap"><canvas id="ratingChart"></canvas></div>
    </div>
    <div class="card">
      <h3>TOP 5 高分电影</h3>
      <div id="top5List" style="font-size:13px;color:var(--muted);">暂无数据</div>
    </div>
  </div>

  <!-- Filter + search -->
  <div class="filter-row">
    <label>评分 ≥</label>
    <input type="range" id="ratingSlider" min="0" max="10" step="0.1" value="0" onchange="onFilterChange()">
    <span class="rating-val" id="ratingLabel">全部</span>
    <input type="text" class="search-box" id="searchInput" placeholder="搜索电影名..." oninput="debounceFilter()">
    <span class="result-hint" id="resultHint"></span>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
      <span class="progress-text" id="progressText"></span>
    </div>
    <span class="status" id="statusMsg"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th class="rank-col">#</th>
            <th>电影名称</th>
            <th class="sortable" onclick="toggleSort('rating')">评分<span class="sort-arrow" id="arrow-rating"></span></th>
            <th class="sortable" onclick="toggleSort('votes')">评价人数<span class="sort-arrow" id="arrow-votes"></span></th>
            <th>导演</th>
            <th class="sortable" onclick="toggleSort('year')">年份<span class="sort-arrow" id="arrow-year"></span></th>
            <th>类型</th>
            <th>链接</th>
          </tr>
        </thead>
        <tbody id="movieBody">
          <tr><td colspan="8" class="empty"><p>暂无数据</p><p style="font-size:12px">点击「开始采集」获取豆瓣电影 Top250</p></td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

</div>

<script>
// ============================================================
// 全局缓存
// ============================================================
let _allMovies = [];
let _chart = null;
let _page = 0;
const _PAGE_SIZE = 25;
let _sortCol = null;
let _sortDir = 1;  // 1=asc, -1=desc

// ============================================================
// 数据加载
// ============================================================
async function loadMovies(minRating) {
  let url = '/api/movies';
  if (minRating && minRating > 0) url += '?min_rating=' + minRating;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  return resp.json();
}

async function loadStats() {
  const resp = await fetch('/api/movies/stats');
  return resp.json();
}

// ============================================================
// 渲染：统计卡片
// ============================================================
function renderStats(stats, movies) {
  document.getElementById('statTotal').textContent = stats.total || 0;
  document.getElementById('statAvg').textContent = stats.avg_rating || '-';
  document.getElementById('statMinMax').textContent =
    stats.max_rating && stats.min_rating
      ? `最高 ${stats.max_rating} / 最低 ${stats.min_rating}`
      : '-';
  const totalVotes = movies.reduce((s, m) => s + (m.votes || 0), 0);
  if (totalVotes > 0) {
    document.getElementById('statVotes').textContent = (totalVotes / 1e4).toFixed(0) + '万';
  }
}

// ============================================================
// 渲染：评分分布图
// ============================================================
function renderChart(movies) {
  if (_chart) _chart.destroy();
  const ctx = document.getElementById('ratingChart').getContext('2d');

  const bins = ['<8.0', '8.0-8.4', '8.5-8.9', '9.0-9.4', '9.5+'];
  const counts = [0, 0, 0, 0, 0];
  movies.forEach(m => {
    const r = m.rating;
    if (r < 8) counts[0]++;
    else if (r < 8.5) counts[1]++;
    else if (r < 9.0) counts[2]++;
    else if (r < 9.5) counts[3]++;
    else counts[4]++;
  });

  _chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: bins,
      datasets: [{
        label: '电影数量',
        data: counts,
        backgroundColor: ['#a8d8ea','#7ec8e3','#54b8dc','#2a94c4','#1a6fc4'],
        borderRadius: 4,
      }]
    },
    options: {
      animation: { duration: 1500, easing: 'easeOutQuart' },
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { precision: 0 }, grid: { color: '#f0f0f0' } },
        x: { grid: { display: false } }
      }
    }
  });
}

// ============================================================
// 渲染：TOP 5 列表
// ============================================================
function renderTop5(movies) {
  const top5 = [...movies].sort((a, b) => (b.rating || 0) - (a.rating || 0)).slice(0, 5);
  const el = document.getElementById('top5List');
  if (top5.length === 0) { el.textContent = '暂无数据'; return; }
  el.innerHTML = top5.map((m, i) =>
    `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)">
      <span><strong style="color:var(--text)">${i+1}.</strong> ${esc(m.title)}</span>
      <span style="color:#e0901e;font-weight:650">${m.rating}</span>
    </div>`
  ).join('');
}

// ============================================================
// 渲染：表格（分页）
// ============================================================
function renderTable(movies) {
  const tbody = document.getElementById('movieBody');
  if (!movies || movies.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty"><p>暂无数据</p><p style="font-size:12px">点击「开始采集」获取豆瓣电影 Top250</p></td></tr>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  const totalPages = Math.ceil(movies.length / _PAGE_SIZE);
  if (_page >= totalPages) _page = totalPages - 1;
  if (_page < 0) _page = 0;
  const start = _page * _PAGE_SIZE;
  const pageMovies = movies.slice(start, start + _PAGE_SIZE);

  tbody.innerHTML = pageMovies.map(m => `
    <tr>
      <td class="rank-col">${m.rank ?? '-'}</td>
      <td>${esc(m.title) || '-'}</td>
      <td class="rating-col">${m.rating ?? '-'}</td>
      <td class="votes-col">${m.votes ? (m.votes/1e4).toFixed(0) + '万' : '-'}</td>
      <td>${esc(trimDirector(m.director)) || '-'}</td>
      <td>${m.year ?? '-'}</td>
      <td>${esc(m.genre) || '-'}</td>
      <td class="link-col">${m.link ? '<a href="'+ esc(m.link) +'" target="_blank">详情</a>' : '-'}</td>
    </tr>
  `).join('');

  // Render pagination controls
  const pg = document.getElementById('pagination');
  pg.innerHTML = `
    <button ${_page === 0 ? 'disabled' : ''} onclick="goPage(0)">«</button>
    <button ${_page === 0 ? 'disabled' : ''} onclick="goPage(${_page - 1})">‹</button>
    <span>第 ${_page + 1} / ${totalPages} 页</span>
    <button ${_page >= totalPages - 1 ? 'disabled' : ''} onclick="goPage(${_page + 1})">›</button>
    <button ${_page >= totalPages - 1 ? 'disabled' : ''} onclick="goPage(${totalPages - 1})">»</button>
  `;
}

function goPage(p) {
  _page = p;
  const movies = getFilteredMovies();
  renderTable(movies);
}

function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// 导演名只保留中文部分（切掉英文名 / 别名）
function trimDirector(name) {
  if (!name) return '';
  // 截断到第一个英文字母或多余的斜杠之前
  const idx = name.search(/[A-Za-z\u00c0-\u024f/]/);
  return idx > 0 ? name.slice(0, idx).trim() : name.trim();
}

// ============================================================
// 筛选逻辑
// ============================================================
function getFilteredMovies() {
  const minRating = parseFloat(document.getElementById('ratingSlider').value) || 0;
  const search = document.getElementById('searchInput').value.trim().toLowerCase();

  let result = _allMovies.filter(m => {
    if (m.rating < minRating) return false;
    if (search && !(m.title || '').toLowerCase().includes(search)) return false;
    return true;
  });

  if (_sortCol) {
    result.sort((a, b) => {
      const va = a[_sortCol] ?? 0;
      const vb = b[_sortCol] ?? 0;
      return (va > vb ? 1 : va < vb ? -1 : 0) * _sortDir;
    });
  }

  return result;
}

// ============================================================
// 表头排序
// ============================================================
function toggleSort(col) {
  if (_sortCol === col) {
    _sortDir = -_sortDir;
  } else {
    _sortCol = col;
    _sortDir = -1;
  }
  updateSortArrows();
  _page = 0;
  const movies = getFilteredMovies();
  renderTable(movies);
}

function updateSortArrows() {
  document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '');
  if (_sortCol) {
    const arrow = document.getElementById('arrow-' + _sortCol);
    if (arrow) arrow.textContent = _sortDir === -1 ? ' ▼' : ' ▲';
  }
}

// ============================================================
// 刷新全部
// ============================================================
async function refreshAll() {
  const slider = document.getElementById('ratingSlider');
  const minRating = parseFloat(slider.value) || 0;
  try {
    if (minRating === 0) {
      _allMovies = await loadMovies(null);
    }
    const movies = getFilteredMovies();
    const stats = await loadStats();
    renderTable(movies);
    renderStats(stats, _allMovies);
    renderChart(_allMovies);
    renderTop5(_allMovies);
    document.getElementById('resultHint').textContent = '共 ' + movies.length + ' 条';
    document.getElementById('statusMsg').textContent = '';
    document.getElementById('statusMsg').className = 'status';
  } catch (e) {
    document.getElementById('statusMsg').textContent = '加载失败: ' + e.message;
    document.getElementById('statusMsg').className = 'status error';
  }
}

// ============================================================
// 滑块 / 搜索触发
// ============================================================
let _filterTimer = null;
function debounceFilter() {
  clearTimeout(_filterTimer);
  _filterTimer = setTimeout(onFilterChange, 150);
}

function onFilterChange() {
  const val = parseFloat(document.getElementById('ratingSlider').value);
  document.getElementById('ratingLabel').textContent = val > 0 ? '≥ ' + val.toFixed(1) : '全部';
  _page = 0;
  const movies = getFilteredMovies();
  renderTable(movies);
  document.getElementById('resultHint').textContent = '共 ' + movies.length + ' 条';
}

// ============================================================
// 采集
// ============================================================
async function doScrape() {
  const btn = document.getElementById('scrapeBtn');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');

  btn.disabled = true;
  btn.textContent = '采集中...';
  progressWrap.classList.add('active');

  // 启动采集
  const resp = await fetch('/api/movies/scrape', { method: 'POST' });
  if (!resp.ok) {
    const err = await resp.json();
    document.getElementById('statusMsg').textContent = '采集失败: ' + (err.detail || '未知错误');
    document.getElementById('statusMsg').className = 'status error';
    btn.disabled = false;
    btn.textContent = '开始采集';
    progressWrap.classList.remove('active');
    return;
  }

  // 轮询进度
  let pollTimer = setInterval(async () => {
    try {
      const s = await fetch('/api/movies/scrape/status').then(r => r.json());
      const pct = s.total > 0 ? Math.round(s.current / s.total * 100) : 0;
      progressFill.style.width = pct + '%';
      progressText.textContent = `${s.current}/${s.total} · ${s.count}条`;

      if (s.current === -1) {
        clearInterval(pollTimer);
        document.getElementById('statusMsg').textContent = '采集失败，请重试';
        document.getElementById('statusMsg').className = 'status error';
        btn.disabled = false;
        btn.textContent = '开始采集';
        progressWrap.classList.remove('active');
      }

      if (!s.running && s.current > 0) {
        clearInterval(pollTimer);
        progressFill.style.width = '100%';
        progressText.textContent = `${s.count} 条完成`;
        setTimeout(() => {
          progressWrap.classList.remove('active');
          document.getElementById('statusMsg').textContent = '';
        }, 1500);
        document.getElementById('ratingSlider').value = 0;
        document.getElementById('ratingLabel').textContent = '全部';
        document.getElementById('searchInput').value = '';
        btn.disabled = false;
        btn.textContent = '开始采集';
        await refreshAll();
      }
    } catch (e) {
      clearInterval(pollTimer);
      progressWrap.classList.remove('active');
      btn.disabled = false;
      btn.textContent = '开始采集';
    }
  }, 500);
}

// ============================================================
// 导出
// ============================================================
function doExport() {
  window.open('/api/movies/export', '_blank');
}

// ============================================================
// 启动
// ============================================================
refreshAll();
</script>
</body>
</html>
